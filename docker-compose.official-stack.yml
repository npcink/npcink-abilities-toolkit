services:
  db:
    image: ${OFFICIAL_STACK_DB_IMAGE:-mariadb:11}
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: wordpress
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - official_stack_db:/var/lib/mysql

  wordpress:
    image: ${OFFICIAL_STACK_WORDPRESS_IMAGE:-wordpress:php8.3-apache}
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_DEBUG_LOG', true );
        define( 'WP_ENVIRONMENT_TYPE', 'local' );
    ports:
      - "${OFFICIAL_STACK_HTTP_PORT:-8899}:80"
    volumes:
      - official_stack_wordpress:/var/www/html
      - ./:/var/www/html/wp-content/plugins/npcink-abilities-toolkit

  cli:
    image: ${OFFICIAL_STACK_WPCLI_IMAGE:-wordpress:cli-php8.3}
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    user: "33:33"
    entrypoint: ["wp"]
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
    volumes:
      - official_stack_wordpress:/var/www/html
      - ./:/var/www/html/wp-content/plugins/npcink-abilities-toolkit
      - ./build/official-stack-cache:/official-stack-cache:ro

volumes:
  official_stack_db:
  official_stack_wordpress:
